<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    --bg-0:#0a0512;
    --panel:#150c22;
    --line:#2a1c3d;
    --ink:#f4f0fa;
    --ink-dim:#9a8fb0;
    --violet:#9333ea;
    --pink:#ec4899;
    --blue:#38bdf8;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    min-height:100%;
    background:var(--bg-0);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    position:relative;
    overflow-x:hidden;
  }

  .grain{
    pointer-events:none;
    position:fixed;
    inset:0;
    z-index:1;
    opacity:0.05;
    mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .vignette{
    pointer-events:none;
    position:fixed;
    inset:0;
    z-index:1;
    background:radial-gradient(ellipse 900px 800px at 50% 25%, transparent 30%, rgba(10,5,18,0.6) 100%);
  }

  .glow{
    pointer-events:none;
    position:fixed;
    inset:-15%;
    z-index:0;
    filter:blur(70px);
    opacity:0.55;
    background:
      radial-gradient(circle at 22% 18%, rgba(147,51,234,0.35), transparent 55%),
      radial-gradient(circle at 80% 15%, rgba(56,189,248,0.28), transparent 55%),
      radial-gradient(circle at 50% 85%, rgba(236,72,153,0.3), transparent 60%);
    animation:glow-drift 26s ease-in-out infinite alternate;
  }
  @keyframes glow-drift{
    0%{transform:translate(-2%, -1%) scale(1);}
    100%{transform:translate(2%, 2%) scale(1.08);}
  }
  @media (prefers-reduced-motion:reduce){
    .glow{animation:none;}
  }

  .wrap{
    position:relative;
    z-index:3;
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:70px 20px;
  }

  .card{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .rise{
    opacity:0;
    transform:translateY(12px);
    animation:rise-in 0.75s cubic-bezier(.16,.8,.24,1) forwards;
  }
  @keyframes rise-in{ to{opacity:1; transform:translateY(0);} }
  @media (prefers-reduced-motion:reduce){
    .rise{animation:none !important; opacity:1 !important; transform:none !important;}
  }

  .kicker{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:28px;
  }
  .kicker .ln{ width:22px; height:1px; background:var(--line); }
  .kicker span{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    font-weight:500;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ink-dim);
  }

  .avatar-frame{
    position:relative;
    width:150px;
    height:150px;
    border-radius:50%;
    margin-bottom:28px;
  }
  .avatar-frame::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--violet), var(--pink), var(--blue), var(--violet));
    box-shadow:
      0 22px 48px -18px rgba(0,0,0,0.85),
      0 0 50px -8px rgba(147,51,234,0.45),
      0 0 50px -8px rgba(236,72,153,0.35);
    animation:ring-spin 16s linear infinite;
  }
  .avatar-frame::after{
    content:"";
    position:absolute;
    inset:-9px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.08);
  }
  @keyframes ring-spin{ from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @media (prefers-reduced-motion:reduce){
    .avatar-frame::before{animation:none;}
  }
  .avatar{
    position:absolute;
    inset:4px;
    border-radius:50%;
    overflow:hidden;
    background:var(--panel);
    border:3px solid var(--bg-0);
  }
  .avatar img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
  }

  .name-wrap{
    position:relative;
    overflow:hidden;
    display:inline-block;
    margin-bottom:6px;
  }
  .name-wrap::after{
    content:"";
    position:absolute;
    inset:0;
    background:var(--bg-0);
    z-index:2;
    animation:curtain 0.85s cubic-bezier(.65,0,.35,1) 0.15s forwards;
  }
  @keyframes curtain{ from{transform:translateX(0);} to{transform:translateX(101%);} }
  @media (prefers-reduced-motion:reduce){
    .name-wrap::after{display:none;}
  }
  .name{
    font-family:'Anton', sans-serif;
    font-weight:400;
    font-size:clamp(44px, 10vw, 64px);
    letter-spacing:0.02em;
    text-transform:uppercase;
    line-height:1;
    background:linear-gradient(90deg, var(--violet), var(--pink) 55%, var(--blue));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:var(--ink);
  }

  .accent{
    width:64px;
    height:3px;
    border-radius:2px;
    overflow:hidden;
    margin:18px 0 26px;
    background:var(--line);
  }
  .accent span{
    display:block;
    height:100%;
    background:linear-gradient(90deg, var(--violet), var(--pink), var(--blue));
    transform-origin:left center;
    animation:draw-in 0.9s cubic-bezier(.2,.8,.2,1) 0.55s both;
  }
  @keyframes draw-in{ from{transform:scaleX(0);} to{transform:scaleX(1);} }
  @media (prefers-reduced-motion:reduce){
    .accent span{animation:none; transform:scaleX(1);}
  }

  .terminal{
    margin-top:8px;
    width:100%;
    max-width:380px;
    text-align:left;
    background:linear-gradient(180deg, #190f28, var(--panel));
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 20px 40px -24px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04);
    opacity:0;
    transform:translateY(14px);
    animation:
      rise-in 0.7s cubic-bezier(.16,.8,.24,1) 0.34s forwards,
      terminal-glow 5s ease-in-out 2s infinite;
  }
  @keyframes terminal-glow{
    0%, 100%{box-shadow:0 20px 40px -24px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 0 rgba(147,51,234,0);}
    50%{box-shadow:0 20px 40px -24px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.04), 0 0 26px -6px rgba(236,72,153,0.3);}
  }
  @media (prefers-reduced-motion:reduce){
    .terminal{animation:none; opacity:1; transform:none;}
  }
  .terminal-bar{
    display:flex;
    align-items:center;
    gap:6px;
    padding:9px 12px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,0.02);
  }
  .terminal-bar i{
    width:8px; height:8px; border-radius:50%; display:block;
    background:#3a3348;
  }
  .terminal-bar span.path{
    margin-left:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    color:var(--ink-dim);
    letter-spacing:0.02em;
  }
  .terminal-body{
    padding:14px 16px 16px;
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    line-height:1.7;
    color:#cfc9db;
  }
  .terminal-body .prompt{ color:var(--pink); }
  .terminal-body .cmd{ color:var(--ink-dim); }
  #typed{ color:#f0ecf8; }
  .cursor{
    display:inline-block;
    width:6px; height:12px;
    background:var(--blue);
    margin-left:2px;
    vertical-align:-2px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{0%,49%{opacity:1;}50%,100%{opacity:0;}}
  @media (prefers-reduced-motion:reduce){
    .cursor{animation:none;}
  }

  .bio-row{
    margin-top:22px;
    display:flex;
    gap:12px;
    align-items:flex-start;
    width:100%;
    max-width:380px;
    text-align:left;
  }
  .bio-bar{
    width:3px;
    flex:none;
    align-self:stretch;
    border-radius:2px;
    margin-top:2px;
    background:linear-gradient(180deg, var(--violet), var(--pink), var(--blue));
  }
  .bio-label{
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    font-weight:500;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--pink);
    margin-bottom:5px;
  }
  .bio{
    font-size:13.5px;
    line-height:1.75;
    font-style:italic;
    color:var(--ink-dim);
  }

  .links{ margin-top:36px; width:100%; }
  .link{
    position:relative;
    display:flex;
    align-items:center;
    gap:13px;
    width:100%;
    padding:15px 16px;
    margin-bottom:10px;
    background:linear-gradient(180deg, #190f28, var(--panel));
    border:1px solid var(--line);
    border-radius:10px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.04), 0 10px 20px -16px rgba(0,0,0,0.85);
  }
  .link .idx{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:#5b4d73;
    width:16px;
    flex:none;
    text-align:left;
  }
  .link .icon{
    width:34px; height:34px; flex:none;
    display:flex; align-items:center; justify-content:center;
    color:var(--acc, var(--ink));
    background:var(--acc-bg, rgba(255,255,255,0.08));
    border-radius:8px;
    padding:7px;
  }
  .link .icon svg{width:100%; height:100%;}
  .link .label{
    font-family:'Inter', sans-serif;
    font-size:14px;
    font-weight:600;
    letter-spacing:0.01em;
  }
  .link .handle{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--ink-dim);
    font-weight:500;
  }

  .discord{ --acc:#5865F2; --acc-bg:rgba(88,101,242,0.18); }
  .tiktok{ --acc:#ffffff; --acc-bg:rgba(255,255,255,0.12); }
  .youtube{ --acc:#e0403d; --acc-bg:rgba(224,64,61,0.18); }
  .spotify{ --acc:#2e8b52; --acc-bg:rgba(46,139,82,0.2); }
  .x{ --acc:#ffffff; --acc-bg:rgba(255,255,255,0.12); }

  .views{
    margin-top:22px;
    display:flex; align-items:center; gap:7px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--ink-dim);
  }
  .views svg{width:15px; height:15px; flex:none;}
  .views b{color:var(--ink); font-weight:600;}

  footer{
    margin-top:22px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:#4c4260;
  }

  @media (min-width:900px){
    .card{max-width:540px;}
    .avatar-frame{width:174px; height:174px;}
    .name{font-size:clamp(56px, 5vw, 76px);}
    .quote{font-size:21px; max-width:420px;}
    .bio{font-size:14.5px; max-width:340px;}
    .link{padding:17px 19px;}
    .link .icon{width:38px; height:38px;}
    .link .label{font-size:15px;}
    .link .handle{font-size:13px;}
  }
  @media (min-width:1400px){
    .card{max-width:600px;}
    .avatar-frame{width:196px; height:196px;}
    .name{font-size:clamp(62px, 4vw, 84px);}
  }

  /* ---------- loader ---------- */
  .loader{
    position:fixed;
    inset:0;
    z-index:50;
    background:var(--bg-0);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    transition:opacity 0.5s ease, visibility 0.5s ease;
  }
  .loader.hide{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
  .loader-ring{
    width:38px;
    height:38px;
    border-radius:50%;
    background:conic-gradient(from 0deg, var(--violet), var(--pink), var(--blue), var(--violet));
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
    mask:radial-gradient(farthest-side, transparent calc(100% - 4px), #000 calc(100% - 3px));
    animation:ring-spin 1s linear infinite;
  }
  .loader-text{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--ink-dim);
    display:flex;
    align-items:center;
    gap:2px;
  }
  .loader-text .dot{
    animation:dot-fade 1.2s ease-in-out infinite;
  }
  .loader-text .dot:nth-child(2){animation-delay:0.15s;}
  .loader-text .dot:nth-child(3){animation-delay:0.3s;}
  @keyframes dot-fade{
    0%, 100%{opacity:0.2;}
    50%{opacity:1;}
  }
  @media (prefers-reduced-motion:reduce){
    .loader-ring{animation:none;}
  }
</style>
</head>

    try{
      var loader = document.getElementById('loader');
      function hideLoader(){ loader.classList.add('hide'); }
      if(document.readyState === 'complete'){
        setTimeout(hideLoader, 300);
      } else {
        window.addEventListener('load', function(){
          setTimeout(hideLoader, 300);
        });
      }
    }catch(e){
      var l = document.getElementById('loader');
      if(l) l.style.display = 'none';
    }
  </script>

  <script>
    try{
      var quoteText = "Errors are just plot twists in your life.";
      var typedEl = document.getElementById('typed');
      var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if(reducedMotion){
        typedEl.textContent = quoteText;
      } else {
        var ti = 0;
        (function typeChar(){
          if(ti <= quoteText.length){
            typedEl.textContent = quoteText.slice(0, ti);
            ti++;
            setTimeout(typeChar, 32);
          }
        })();
      }
    }catch(e){
      var fallbackEl = document.getElementById('typed');
      if(fallbackEl) fallbackEl.textContent = "Errors are just plot twists in your life.";
    }
  </script>

  <script>
    try{
      var counterKey = 'homelender-hu-profile-2026-views';
      var seenKey = 'homelender_has_viewed';
      var endpoint = localStorage.getItem(seenKey)
        ? 'https://countapi.mileshilliard.com/api/v1/get/' + counterKey
        : 'https://countapi.mileshilliard.com/api/v1/hit/' + counterKey;

      fetch(endpoint)
        .then(function(res){ return res.json(); })
        .then(function(data){
          document.getElementById('viewCount').textContent = data.value;
          localStorage.setItem(seenKey, '1');
        })
        .catch(function(){
          document.getElementById('viewCount').textContent = '—';
        });
    }catch(e){
      var vc = document.getElementById('viewCount');
      if(vc) vc.textContent = '—';
    }
